<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Lists - MovieTrakk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@500;700;800&family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,1,0&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/catalog.css" />
    <link rel="stylesheet" href="/css/my-lists.css" />
</head>
<body class="catalog-page">
    <header class="top-nav">
        <div class="brand-wrap">
            <h1>MovieTrakk</h1>
            <p>My library</p>
        </div>
        <div class="session-wrap">
            <p class="session-line">Session: <strong id="session-user" data-session-user>Guest</strong></p>
            <a href="/catalog.html" class="nav-action">
                <span class="material-symbols-outlined" aria-hidden="true">movie</span>
                <span>Catalog</span>
            </a>
            <button type="button" class="nav-action" id="go-admin-dashboard" data-admin-link hidden>
                <span class="material-symbols-outlined" aria-hidden="true">admin_panel_settings</span>
                <span>Admin</span>
            </button>
            <button type="button" class="nav-action ghost" data-action="logout">Log out</button>
        </div>
    </header>

    <div class="catalog-layout">
        <main class="catalog-main">
            <div class="main-head">
                <h2>My Collections</h2>
                <p>View your personal movie library organized by status.</p>
            </div>

            <section class="list-tabs">
                <button class="tab-button active" data-list-type="watched">Watched</button>
                <button class="tab-button" data-list-type="watch-later">Watch Later</button>
                <button class="tab-button" data-list-type="liked">Liked</button>
                <button class="tab-button" data-list-type="disliked">Disliked</button>
            </section>

            <p id="status-message" class="message" aria-live="polite"></p>
            <section id="movies-grid" class="catalog-grid" aria-label="My movie lists"></section>
            <div id="loading" class="loading" style="display: none;">Loading...</div>
        </main>
    </div>

    <script src="/js/my-lists.js"></script>
</body>
</html>
