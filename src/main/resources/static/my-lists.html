<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="lists.title">My Lists - MovieTrakk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@500;700;800&family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,1,0&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/catalog.css" />
    <link rel="stylesheet" href="/css/my-lists.css" />
</head>
<body class="catalog-page">
    <header class="top-nav">
        <div class="brand-wrap">
            <h1>MovieTrakk</h1>
            <p data-i18n="lists.subtitle">My library</p>
        </div>
        <div class="session-wrap">
            <p class="session-line"><span data-i18n="common.session">Session:</span> <strong id="session-user" data-session-user>Guest</strong></p>
            <a href="/catalog.html" class="nav-action">
                <span class="material-symbols-outlined" aria-hidden="true">movie</span>
                <span data-i18n="common.catalog">Catalog</span>
            </a>
            <button type="button" class="nav-action" id="go-admin-dashboard" data-admin-link hidden>
                <span class="material-symbols-outlined" aria-hidden="true">admin_panel_settings</span>
                <span data-i18n="common.admin">Admin</span>
            </button>
            <button type="button" class="nav-action ghost" data-action="logout" data-i18n="common.logout">Log out</button>
        </div>
    </header>

    <div class="catalog-layout">
        <aside class="filter-panel my-lists-panel">
            <h2 data-i18n="lists.heading">My Lists</h2>
            <p data-i18n="lists.copy">Choose which collection you want to see.</p>

            <section class="list-tabs" aria-label="Movie list filters" data-i18n-aria-label="lists.filtersAria">
                <button class="tab-button active" data-list-type="watched" data-i18n="lists.watched">Watched</button>
                <button class="tab-button" data-list-type="watch-later" data-i18n="lists.watchLater">Watch Later</button>
                <button class="tab-button" data-list-type="liked" data-i18n="lists.liked">Liked</button>
                <button class="tab-button" data-list-type="disliked" data-i18n="lists.disliked">Disliked</button>
            </section>

            <p id="status-message" class="message status-message" aria-live="polite"></p>
        </aside>

        <main class="catalog-main">
            <div class="main-head">
                <h2 data-i18n="lists.collections">My Collections</h2>
                <p data-i18n="lists.collectionsCopy">View your personal movie library organized by status.</p>
            </div>
            <section id="catalog-grid" class="catalog-grid" aria-label="My movie lists" data-i18n-aria-label="lists.gridAria"></section>
            <div id="loading" class="loading" style="display: none;" data-i18n="common.loading">Loading...</div>
        </main>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/my-lists.js"></script>
</body>
</html>
