<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Tracker - Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/catalog.css" />
</head>
<body>
    <main class="catalog-layout">
        <section class="hero">
            <h1>Catalog</h1>
        </section>

        <section class="controls">
            <div class="control-group control-title">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Search by title..." />
            </div>
            <div class="control-group">
                <label for="genre">Genre</label>
                <select id="genre" name="genre">
                    <option value="all" selected>All</option>
                    <option value="comedy">Comedy</option>
                    <option value="drama">Drama</option>
                    <option value="sci-fi">Sci-Fi</option>
                </select>
            </div>
            <div class="control-group">
                <label for="year">Year</label>
                <input type="number" id="year" name="year" min="1800" max="2026" placeholder="e.g. 2024" />
            </div>
        </section>

        <p id="catalog-message" class="message" aria-live="polite"></p>

        <section id="catalog-grid" class="catalog-grid" aria-label="Movie cards"></section>
    </main>

    <script src="/js/catalog.js"></script>
</body>
</html>
