<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieTrakk - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/auth.css" />
</head>
<body>
    <main class="auth-layout">
        <section class="hero">
            <h1>MovieTrakk</h1>
        </section>

        <section class="forms" aria-label="Registration form">
            <article class="card single-card">
                <h2>Create account</h2>
                <form id="register-form" novalidate>
                    <label for="register-username">Username</label>
                    <input id="register-username" name="username" type="text" required minlength="3" />

                    <label for="register-email">Email</label>
                    <input id="register-email" name="email" type="email" required />

                    <label for="register-password">Password</label>
                    <input id="register-password" name="password" type="password" required minlength="6" />

                    <button type="submit">Create account</button>
                    <p id="register-message" class="message" aria-live="polite"></p>
                </form>

                <a class="secondary-button" href="/index.html">I already have an account</a>
            </article>
        </section>
    </main>

    <script src="/js/auth.js"></script>
</body>
</html>
